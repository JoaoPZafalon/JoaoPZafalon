name: Jogo da Cobrinha

on:
  schedule:
    # Executa automaticamente a cada 12 horas
    - cron: "0 */12 * * *"
  
  # Permite que você execute manualmente pela aba Actions
  workflow_dispatch:

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Passagem 1: Baixa o código do seu repositório
      - name: Checkout do código
        uses: actions/checkout@v4
        
      # Passagem 2: Gera os arquivos da cobrinha (versão normal e modo escuro)
      - name: Gerar o jogo da cobrinha
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Passagem 3: Salva os arquivos gerados na branch "output"
      - name: Enviar os arquivos para o repositório
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
